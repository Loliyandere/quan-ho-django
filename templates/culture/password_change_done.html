{% extends 'base.html' %}
{% load static %}

{% block title %}Đổi Mật Khẩu Thành Công - Quan Họ Bắc Ninh{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white rounded-xl shadow-xl overflow-hidden border border-quanho-gold/40 text-center">
        
        <div class="bg-quanho-brown p-6 relative border-b-4 border-quanho-gold">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/rice-paper.png')] opacity-30 mix-blend-overlay"></div>
            <div class="relative z-10 w-16 h-16 bg-green-500 rounded-full mx-auto flex items-center justify-center mb-4 border-4 border-white shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="relative z-10 text-2xl font-traditional font-bold text-white mb-2">Thành Công!</h2>
        </div>

        <div class="p-8">
            <p class="text-gray-700 mb-8">Mật khẩu của bạn đã được thay đổi thành công. Vui lòng ghi nhớ mật khẩu mới cho các lần đăng nhập tiếp theo.</p>
            
            <a href="{% url 'culture:home' %}" class="inline-flex justify-center py-2.5 px-6 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-quanho-red hover:bg-[#7a1807] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-quanho-red transition">
                Về Trang Chủ
            </a>
        </div>
    </div>
</div>
{% endblock %}
